kind: Added
body: 'Release pipeline now adds SLSA build-provenance attestations alongside the existing SBOM attestation, and publishes a SHA-256 checksums file (spruce-<version>.sha256sum) that is itself attested and uploaded to the GitHub Release. A `just dist` recipe builds the same artifact set (source archive, SBOM, checksums) locally.'
