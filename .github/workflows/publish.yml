name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  publish-hex:
    name: Publish Hex
    needs: validate
    if: ${{ needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Setup Gleam
        uses: tylerbutler/actions/setup-gleam@1761c18aa4583d74916e1a53f2a106d1d70d72a8 # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          erlang-version: "27.2"
          gleam-version: "1.16.0"
          run-deps: "false"

      - name: Download dependencies
        run: gleam deps download

      - name: Publish package to Hex
        uses: tylerbutler/actions/gleam-publish@1761c18aa4583d74916e1a53f2a106d1d70d72a8 # ratchet:tylerbutler/actions/gleam-publish@main
        with:
          packages: "."
          working-directory: "."
          hex-api-key: ${{ secrets.HEX_API_KEY }}
          skip-already-published: "true"

  sbom:
    name: Attest and Upload Artifacts
    # Runs after the package is on Hex so assets are only attached for versions
    # that actually published. changie-auto-tag (create-release: true) is the
    # sole Release owner and creates the Release with the tag, so this job only
    # uploads assets to the existing Release — no race, no create.
    needs: [validate, publish-hex]
    if: ${{ needs.publish-hex.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Setup mise tools
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # ratchet:jdx/mise-action@v2
        env:
          # Avoid unauthenticated GitHub API rate limits when mise resolves the
          # licence_audit release and verifies its build attestations.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: gleam deps download

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip the leading "v" from the tag so asset names use bare semver
          # (e.g. spruce-1.0.0.cdx.json), matching the Hex package version.
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          licence_audit sbom --output="dist/spruce-${VERSION}.cdx.json"

      - name: Create source archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix="spruce-${VERSION}/" \
            -o "dist/spruce-${VERSION}.tar.gz" HEAD

      - name: Generate checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # SHA-256 checksums for the published artifacts. Run from dist/ so the
          # file records bare names (not dist/ prefixes); the checksums file does
          # not include itself.
          cd dist
          sha256sum \
            "spruce-${VERSION}.tar.gz" \
            "spruce-${VERSION}.cdx.json" \
            > "spruce-${VERSION}.sha256sum"

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # ratchet:actions/attest@v4
        with:
          subject-path: dist/spruce-${{ steps.version.outputs.version }}.tar.gz
          sbom-path: dist/spruce-${{ steps.version.outputs.version }}.cdx.json

      - name: Attest build provenance
        # SLSA build provenance for every shipped artifact, including the
        # checksums file — verifying the checksums file's provenance lets
        # consumers verify the rest offline against it.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # ratchet:actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/spruce-${{ steps.version.outputs.version }}.tar.gz
            dist/spruce-${{ steps.version.outputs.version }}.cdx.json
            dist/spruce-${{ steps.version.outputs.version }}.sha256sum

      - name: Upload SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # changie-auto-tag (create-release: true) already created the Release
          # together with the tag, so it exists before this tag-triggered run.
          # We only attach assets here. The Release is keyed by the tag
          # ($REF_NAME, e.g. v1.0.0); asset files use bare semver ($VERSION).
          gh release upload "$REF_NAME" \
            "dist/spruce-${VERSION}.cdx.json" \
            "dist/spruce-${VERSION}.tar.gz" \
            "dist/spruce-${VERSION}.sha256sum" \
            --clobber
