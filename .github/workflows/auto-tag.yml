name: Auto-tag release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  auto-tag:
    uses: tylerbutler/actions/.github/workflows/auto-tag.yml@ee7def5950abcf0a519add705a95719ab345c05e # ratchet:tylerbutler/actions/.github/workflows/auto-tag.yml@v1
    with:
      # The Publish workflow's `sbom` job owns the GitHub Release (it creates it
      # after publishing to Hex, then attaches the signed SBOM). Creating it here
      # too would race/conflict, so auto-tag only pushes the tag.
      create-release: false
    secrets:
      app-id: ${{ secrets.RELEASE_APP_ID }}
      app-private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
