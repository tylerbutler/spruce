name: Auto-tag release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  auto-tag:
    uses: tylerbutler/actions/.github/workflows/auto-tag.yml@1761c18aa4583d74916e1a53f2a106d1d70d72a8 # ratchet:tylerbutler/actions/.github/workflows/auto-tag.yml@main
    with:
      # changie-auto-tag is the sole, race-free Release owner: it creates the
      # GitHub Release together with the tag (the Release exists before the tag
      # is visible remotely). The downstream Publish `sbom` job only uploads
      # assets to that Release, never creates it.
      create-release: true
    secrets:
      app-id: ${{ secrets.RELEASE_APP_ID }}
      app-private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
